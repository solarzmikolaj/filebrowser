services:
  cert-init:
    image: alpine:3.23
    container_name: filebrowser-cert-init
    restart: "no"
    environment:
      SSL_CN: ${SSL_CN:-localhost}
      SSL_DAYS: ${SSL_DAYS:-9125}
    volumes:
      - filebrowser_tls:/tls
    command: >-
      sh -c 'apk add --no-cache openssl >/dev/null && if [ ! -f /tls/tls.crt ] || [ ! -f /tls/tls.key ]; then
      CN="$${SSL_CN:-localhost}";
      DAYS="$${SSL_DAYS:-9125}";
      openssl req -x509 -nodes -newkey rsa:2048 -sha256
      -keyout /tls/tls.key
      -out /tls/tls.crt
      -days "$$DAYS"
      -subj "/CN=$$CN"
      -addext "subjectAltName=DNS:$$CN,DNS:localhost,IP:127.0.0.1";
      fi'

  filebrowser:
    build:
      context: .
      dockerfile: Dockerfile.selfhost
    image: my-filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    volumes:
      - /srv/filebrowser/data:/srv
      - /srv/filebrowser/database:/database
      - /srv/filebrowser/config:/config
    expose:
      - "80"

  proxy:
    image: nginx:1.27-alpine
    container_name: filebrowser-proxy
    depends_on:
      - cert-init
      - filebrowser
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/selfsigned/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/selfsigned/nginx-entrypoint.sh:/entrypoint.sh:ro
      - filebrowser_tls:/etc/nginx/tls
    command: ["/bin/sh", "/entrypoint.sh"]

volumes:
  filebrowser_tls:
